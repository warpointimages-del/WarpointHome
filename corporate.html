<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WARPOINT · Дни рождения</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="inner" id="main-page">
    <div class="app">
        <div class="logo-container">
            <a href="index.html" class="logo-link" id="logoButton">
                <div class="logo-svg-wrapper">
                    <img class="logo-full" src="svgs/logofull.svg" alt="Full logo" draggable="false" onerror="this.style.backgroundColor='#8a6de9';this.style.width='180px';this.style.height='44px';this.style.borderRadius='8px';this.style.background='linear-gradient(90deg, #8a6de9 90px, #b09aff 90px)'">
                    <img class="logo-short" src="svgs/logoshort.svg" alt="Short logo" draggable="false" onerror="this.style.backgroundColor='#8a6de9';this.style.width='70px';this.style.height='44px';this.style.borderRadius='8px'">
                </div>
            </a>
        </div>

        <div class="inner-content">
            <h2>Корпоративы</h2>
        </div>

        <div class="page-indicator">Станколит</div>
    </div>

    <script>
        (function() {
            const body = document.getElementById('main-page');
            const logoBtn = document.getElementById('logoButton');
            
            window.animateToHome = function(targetUrl) {
                body.classList.add('morphing');
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 800);
                return false;
            };

            logoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                animateToHome('index.html');
            });
        })();
    </script>
</body>
</html>
