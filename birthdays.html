<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WARPOINT · Дни Рождения</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="inner" id="main-page">
    <div class="app">
        <div class="logo-container">
            <div class="logo-svg-wrapper">
                <img class="logo-full" src="svgs/logofull.svg" alt="Full logo" draggable="false">
                <img class="logo-short" src="svgs/logoshort.svg" alt="Short logo" draggable="false">
            </div>
        </div>

        <div class="page-wrapper" id="pageWrapper">
            <div class="inner-content">
                <h2>Дни Рождения</h2>
            </div>
            <div class="page-indicator">Станколит</div>
        </div>
    </div>

    <script>
        (function() {
            const body = document.getElementById('main-page');
            const pageWrapper = document.getElementById('pageWrapper');
            let isTransitioning = false;

            function navigateToHome() {
                if (isTransitioning) return;
                isTransitioning = true;
                
                // Анимация логотипа
                body.classList.add('morphing');
                
                // Анимация страницы — приезжает справа (ставим класс перед переходом)
                pageWrapper.style.transform = 'translateX(100%)';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 400);
            }

            document.querySelector('.logo-container').addEventListener('click', (e) => {
                e.preventDefault();
                navigateToHome();
            });
            
            // Небольшая задержка для плавного появления страницы при загрузке
            setTimeout(() => {
                pageWrapper.style.transform = 'translateX(0)';
                pageWrapper.style.transition = 'transform 0.4s cubic-bezier(0.65, 0, 0.35, 1)';
            }, 50);
        })();
    </script>
</body>
</html>
