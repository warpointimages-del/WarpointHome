<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WARPOINT · Регистрация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="inner" id="main-page">
    <div class="page-transition-container">
        <div class="transition-overlay" id="transitionOverlay"></div>
    </div>
    
    <div class="app">
        <div class="logo-container">
            <div class="logo-svg-wrapper">
                <img class="logo-full" src="svgs/logofull.svg" alt="Full logo" draggable="false">
                <img class="logo-short" src="svgs/logoshort.svg" alt="Short logo" draggable="false">
            </div>
        </div>

        <div class="inner-content">
            <h2>Регистрация</h2>
        </div>

        <div class="page-indicator">Станколит</div>
    </div>

    <script>
        (function() {
            const body = document.getElementById('main-page');
            const overlay = document.getElementById('transitionOverlay');
            let isTransitioning = false;

            function navigateToHome() {
                if (isTransitioning) return;
                isTransitioning = true;
                
                body.classList.add('morphing');
                overlay.classList.add('active');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 400);
            }

            document.querySelector('.logo-container').addEventListener('click', (e) => {
                e.preventDefault();
                navigateToHome();
            });
        })();
    </script>
</body>
</html>
