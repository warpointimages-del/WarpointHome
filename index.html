<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logo morph · clean swap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #323549;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            transition: background-color 0.2s;
        }

        .app {
            max-width: 100vw;
            min-height: 100vh;
            padding: 1.5rem 2rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
        }

        /* ----- HOME (широкий логотип сверху по центру) ----- */
        .home .logo-container {
            align-self: center;
            width: fit-content;
            max-width: 90vw;
            margin-top: 15vh;
        }

        .home .logo-short {
            display: none;
        }

        .home .logo-full {
            display: block;
            width: auto;
            max-width: 70vw;
            max-height: 12vh;
            object-fit: contain;
        }

        /* ----- INNER (короткий логотип слева сверху) ----- */
        .inner .logo-container {
            align-self: flex-start;
            margin-top: 0;
        }

        .inner .logo-full {
            display: none;
        }

        .inner .logo-short {
            display: block;
            width: auto;
            height: 8vh;
            min-height: 44px;
            max-width: 40vw;
            object-fit: contain;
        }

        /* общий контейнер для логотипа */
        .logo-container {
            transition: all 0.3s ease;
        }

        .logo-link {
            display: inline-block;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .logo-svg-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
        }

        /* оба логотипа по умолчанию скрыты, показываем через классы body */
        .logo-short,
        .logo-full {
            display: none;
            transition: opacity 0.3s ease;
        }

        /* ----- АНИМАЦИЯ ПЕРЕХОДА ----- */
        /* во время анимации показываем оба лого, чтобы создать эффект трансформации */
        body.morphing .logo-full,
        body.morphing .logo-short {
            display: block;
        }

        /* стартовое состояние для home → inner */
        body.morphing.home .logo-full {
            animation: shrinkToLeft 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            transform-origin: left center;
            position: relative;
            z-index: 2;
        }

        body.morphing.home .logo-short {
            animation: slideShort 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            transform-origin: left center;
            position: relative;
            left: 0;
            z-index: 1;
        }

        /* стартовое состояние для inner → home */
        body.morphing.inner .logo-short {
            animation: hideShort 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            transform-origin: left center;
        }

        body.morphing.inner .logo-full {
            animation: growFromLeft 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            transform-origin: left center;
        }

        @keyframes shrinkToLeft {
            0% {
                opacity: 1;
                transform: scaleX(1) translateX(0);
                width: auto;
            }
            100% {
                opacity: 0;
                transform: scaleX(0.2) translateX(-25%);
                width: 0;
            }
        }

        @keyframes slideShort {
            0% {
                opacity: 0;
                transform: scaleX(0.2) translateX(-30%);
                width: 0;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                opacity: 1;
                transform: scaleX(1) translateX(0);
                width: auto;
            }
        }

        @keyframes hideShort {
            0% {
                opacity: 1;
                transform: scaleX(1) translateX(0);
                width: auto;
            }
            100% {
                opacity: 0;
                transform: scaleX(0.2) translateX(-25%);
                width: 0;
            }
        }

        @keyframes growFromLeft {
            0% {
                opacity: 0;
                transform: scaleX(0.2) translateX(-25%);
                width: 0;
            }
            100% {
                opacity: 1;
                transform: scaleX(1) translateX(0);
                width: auto;
            }
        }

        /* навигация */
        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 2.5rem;
            align-self: center;
        }

        .btn {
            background: #4d506b;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.2rem;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-shadow: 0 8px 0 #2a2c3b, 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            border: 2px solid #6a6e8c;
            touch-action: manipulation;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #2a2c3b, 0 5px 12px rgba(0,0,0,0.3);
        }

        .page-indicator {
            color: #b9bff2;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.2);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            align-self: center;
            margin-top: 2rem;
            backdrop-filter: blur(2px);
        }

        /* контент для внутренней страницы */
        .inner .content-box {
            background: #3d405b;
            padding: 2rem;
            border-radius: 3rem;
            color: #eaeefc;
            width: 100%;
            max-width: 500px;
            align-self: center;
            margin-top: 2rem;
            border: 2px solid #5f6382;
            box-shadow: 0 15px 0 #2a2c3b;
        }

        /* плейсхолдеры для svg из репозитория */
        .logo-short {
            content: url('svgs/logoshort.svg');
        }

        .logo-full {
            content: url('svgs/logofull.svg');
        }

        /* фолбек если svg не загрузились */
        .logo-short[src="svgs/logoshort.svg"],
        .logo-full[src="svgs/logofull.svg"] {
            background: #8a6de9;
            border-radius: 20px;
            min-width: 60px;
            min-height: 60px;
        }

        @media (orientation: landscape) {
            .home .logo-container {
                margin-top: 8vh;
            }
            .inner .logo-short {
                height: 12vh;
            }
        }
    </style>
</head>
<body class="home" id="main-page">
    <div class="app">
        <!-- контейнер с логотипом -->
        <div class="logo-container">
            <a href="#" class="logo-link" onclick="return false;" style="cursor: default;">
                <div class="logo-svg-wrapper">
                    <img class="logo-full" src="svgs/logofull.svg" alt="Full logo" draggable="false">
                    <img class="logo-short" src="svgs/logoshort.svg" alt="Short logo" draggable="false">
                </div>
            </a>
        </div>

        <!-- кнопки навигации -->
        <div class="nav-links">
            <button class="btn" id="toInnerBtn">→ на внутреннюю</button>
            <button class="btn btn-secondary" id="toHomeBtn">← на главную</button>
        </div>

        <!-- индикатор страницы -->
        <div class="page-indicator" id="pageLabel">главная · широкий логотип</div>

        <!-- контент для внутренней страницы (изначально скрыт) -->
        <div id="innerPageContent" style="width: 100%; display: none; justify-content: center;">
            <div class="content-box">
                ✦ внутренняя страница ✦<br>
                здесь только короткий логотип слева<br>
                <span style="color: #b9adff;">landscape mode, портрет не используется</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const body = document.getElementById('main-page');
            const toInnerBtn = document.getElementById('toInnerBtn');
            const toHomeBtn = document.getElementById('toHomeBtn');
            const pageLabel = document.getElementById('pageLabel');
            const innerContent = document.getElementById('innerPageContent');
            
            // флаг для блокировки повторной анимации
            let isAnimating = false;

            // функция смены страницы с анимацией
            function navigateTo(targetPage) {
                if (isAnimating) return;
                
                const currentIsHome = body.classList.contains('home');
                
                // если уже на целевой странице — ничего не делаем
                if ((targetPage === 'home' && currentIsHome) || (targetPage === 'inner' && !currentIsHome)) {
                    return;
                }

                isAnimating = true;

                // добавляем класс morphing для запуска анимации
                body.classList.add('morphing');

                // через 450 мс (длительность анимации) меняем класс страницы и убираем morphing
                setTimeout(() => {
                    if (targetPage === 'inner') {
                        body.classList.remove('home');
                        body.classList.add('inner');
                        pageLabel.innerText = 'внутренняя · короткий логотип';
                        innerContent.style.display = 'flex';
                    } else {
                        body.classList.remove('inner');
                        body.classList.add('home');
                        pageLabel.innerText = 'главная · широкий логотип';
                        innerContent.style.display = 'none';
                    }
                    
                    // убираем класс анимации
                    body.classList.remove('morphing');
                    isAnimating = false;
                }, 450);
            }

            // обработчики кнопок
            toInnerBtn.addEventListener('click', () => navigateTo('inner'));
            toHomeBtn.addEventListener('click', () => navigateTo('home'));

            // фолбек для svg
            document.querySelectorAll('.logo-full, .logo-short').forEach(img => {
                img.onerror = function() {
                    this.style.backgroundColor = '#8a6de9';
                    this.style.minWidth = '100px';
                    this.style.minHeight = '60px';
                    this.style.borderRadius = '30px';
                };
            });
        })();
    </script>
</body>
</html>
