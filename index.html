<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logo morph · perfect flyaway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #323549;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .app {
            max-width: 100vw;
            min-height: 100vh;
            padding: 1.5rem 2rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
        }

        /* ----- HOME (широкий логотип сверху по центру) ----- */
        .home .logo-container {
            position: absolute;
            left: 50%;
            top: 15vh;
            transform: translateX(-50%);
            width: fit-content;
        }

        .home .logo-short {
            display: none;
        }

        .home .logo-full {
            display: block;
            width: auto;
            max-width: 70vw;
            max-height: 12vh;
            object-fit: contain;
            background: transparent;
        }

        /* ----- INNER (короткий логотип слева сверху) ----- */
        .inner .logo-container {
            position: absolute;
            left: 2rem;
            top: 1.5rem;
            transform: none;
            width: fit-content;
        }

        .inner .logo-full {
            display: none;
        }

        .inner .logo-short {
            display: block;
            width: auto;
            height: 8vh;
            min-height: 44px;
            max-width: 40vw;
            object-fit: contain;
            background: transparent;
            cursor: pointer;
        }

        /* общие стили */
        .logo-container {
            transition: all 0.45s cubic-bezier(0.65, 0, 0.35, 1);
            z-index: 10;
        }

        .logo-link {
            display: inline-block;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        .logo-svg-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
        }

        /* оба логотипа с прозрачным фоном */
        .logo-short,
        .logo-full {
            display: none;
            background: transparent !important;
        }

        /* ----- АНИМАЦИЯ ПЕРЕХОДА home → inner ----- */
        body.morphing .logo-full,
        body.morphing .logo-short {
            display: block;
        }

        /* летим из центра в левый верхний угол */
        body.morphing.home .logo-container {
            animation: flyToCorner 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        body.morphing.home .logo-full {
            animation: fadeFull 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        body.morphing.home .logo-short {
            animation: appearShort 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        /* летим из угла в центр (inner → home) */
        body.morphing.inner .logo-container {
            animation: flyToCenter 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        body.morphing.inner .logo-short {
            animation: fadeShort 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        body.morphing.inner .logo-full {
            animation: appearFull 0.45s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes flyToCorner {
            0% {
                left: 50%;
                top: 15vh;
                transform: translateX(-50%);
            }
            100% {
                left: 2rem;
                top: 1.5rem;
                transform: translateX(0);
            }
        }

        @keyframes flyToCenter {
            0% {
                left: 2rem;
                top: 1.5rem;
                transform: translateX(0);
            }
            100% {
                left: 50%;
                top: 15vh;
                transform: translateX(-50%);
            }
        }

        @keyframes fadeFull {
            0% {
                opacity: 1;
                transform: scaleX(1);
            }
            100% {
                opacity: 0;
                transform: scaleX(0.2);
            }
        }

        @keyframes appearShort {
            0% {
                opacity: 0;
                transform: scaleX(0.2);
            }
            100% {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        @keyframes fadeShort {
            0% {
                opacity: 1;
                transform: scaleX(1);
            }
            100% {
                opacity: 0;
                transform: scaleX(0.2);
            }
        }

        @keyframes appearFull {
            0% {
                opacity: 0;
                transform: scaleX(0.2);
            }
            100% {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        /* навигация - только кнопка на главную (на главной) */
        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 2.5rem;
            align-self: center;
            position: relative;
            z-index: 5;
        }

        .btn {
            background: #4d506b;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.2rem;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-shadow: 0 8px 0 #2a2c3b, 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            border: 2px solid #6a6e8c;
            touch-action: manipulation;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #2a2c3b, 0 5px 12px rgba(0,0,0,0.3);
        }

        /* на внутренней странице кнопка скрыта */
        .inner .nav-links {
            display: none;
        }

        .page-indicator {
            color: #b9bff2;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.2);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            align-self: center;
            margin-top: 2rem;
            backdrop-filter: blur(2px);
        }

        /* контент для внутренней страницы */
        .inner .content-box {
            background: #3d405b;
            padding: 2rem;
            border-radius: 3rem;
            color: #eaeefc;
            width: 100%;
            max-width: 500px;
            align-self: center;
            margin-top: 2rem;
            border: 2px solid #5f6382;
            box-shadow: 0 15px 0 #2a2c3b;
        }

        /* плейсхолдеры для svg из репозитория - без фона */
        .logo-short {
            content: url('svgs/logoshort.svg');
        }

        .logo-full {
            content: url('svgs/logofull.svg');
        }

        /* фолбек если svg не загрузились - но фон прозрачный */
        .logo-short[src="svgs/logoshort.svg"],
        .logo-full[src="svgs/logofull.svg"] {
            background: transparent !important;
            min-width: 60px;
            min-height: 60px;
            border: 1px dashed #8a6de9; /* пунктир чтобы было видно границы при отсутствии файлов */
        }

        @media (orientation: landscape) {
            .home .logo-container {
                top: 8vh;
            }
            .inner .logo-short {
                height: 12vh;
            }
        }

        /* отключаем фон у изображений */
        img {
            background: transparent;
        }
    </style>
</head>
<body class="home" id="main-page">
    <div class="app">
        <!-- контейнер с логотипом (ОН ЖЕ КНОПКА НАЗАД НА INNER) -->
        <div class="logo-container">
            <a href="#" class="logo-link" id="logoButton" onclick="return false;">
                <div class="logo-svg-wrapper">
                    <img class="logo-full" src="svgs/logofull.svg" alt="Full logo" draggable="false">
                    <img class="logo-short" src="svgs/logoshort.svg" alt="Short logo" draggable="false">
                </div>
            </a>
        </div>

        <!-- кнопка навигации (только на главной) -->
        <div class="nav-links">
            <button class="btn" id="toInnerBtn">→ на внутреннюю</button>
        </div>

        <!-- индикатор страницы (опционально, для ясности) -->
        <div class="page-indicator" id="pageLabel">главная · широкий логотип</div>

        <!-- контент для внутренней страницы -->
        <div id="innerPageContent" style="width: 100%; display: none; justify-content: center;">
            <div class="content-box">
                ✦ внутренняя страница ✦<br>
                логотип слева — кнопка назад на главную<br>
                <span style="color: #b9adff;">нажми на короткий логотип</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const body = document.getElementById('main-page');
            const toInnerBtn = document.getElementById('toInnerBtn');
            const logoBtn = document.getElementById('logoButton');
            const pageLabel = document.getElementById('pageLabel');
            const innerContent = document.getElementById('innerPageContent');
            
            let isAnimating = false;

            function navigateTo(targetPage) {
                if (isAnimating) return;
                
                const currentIsHome = body.classList.contains('home');
                
                if ((targetPage === 'home' && currentIsHome) || (targetPage === 'inner' && !currentIsHome)) {
                    return;
                }

                isAnimating = true;
                body.classList.add('morphing');

                setTimeout(() => {
                    if (targetPage === 'inner') {
                        body.classList.remove('home');
                        body.classList.add('inner');
                        pageLabel.innerText = 'внутренняя · короткий логотип (кликни по нему)';
                        innerContent.style.display = 'flex';
                    } else {
                        body.classList.remove('inner');
                        body.classList.add('home');
                        pageLabel.innerText = 'главная · широкий логотип';
                        innerContent.style.display = 'none';
                    }
                    
                    body.classList.remove('morphing');
                    isAnimating = false;
                }, 450);
            }

            // кнопка "на внутреннюю"
            toInnerBtn.addEventListener('click', () => navigateTo('inner'));

            // логотип как кнопка "на главную" (работает только на inner странице)
            logoBtn.addEventListener('click', () => {
                // срабатывает только если мы на inner
                if (body.classList.contains('inner')) {
                    navigateTo('home');
                }
                // на главной логотип не кликабельный для навигации (но можно оставить как есть)
            });

            // фолбек для svg - без фона, просто контур
            document.querySelectorAll('.logo-full, .logo-short').forEach(img => {
                img.onerror = function() {
                    this.style.backgroundColor = 'transparent';
                    this.style.minWidth = '100px';
                    this.style.minHeight = '60px';
                    this.style.border = '2px dashed #8a6de9';
                    this.style.borderRadius = '0';
                };
            });

            // маленькая хитрость: на home логотип не кликабельный (но можно оставить, ничего не сломает)
            // добавим стиль для курсора
            const style = document.createElement('style');
            style.textContent = `
                .inner .logo-link {
                    cursor: pointer;
                }
                .home .logo-link {
                    cursor: default;
                }
            `;
            document.head.appendChild(style);
        })();
    </script>
</body>
</html>
