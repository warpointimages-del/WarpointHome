<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logo morph · perfect both ways</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #323549;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .app {
            max-width: 100vw;
            min-height: 100vh;
            padding: 1.5rem 2rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* общие стили для логотипов - одинаковая высота */
        .logo-full, .logo-short {
            height: 8vh;
            min-height: 44px;
            width: auto;
            object-fit: contain;
            background: transparent;
            border: none;
            outline: none;
        }

        /* HOME: широкий логотип (буква + текст) */
        .home .logo-container {
            position: absolute;
            left: 50%;
            top: 15vh;
            transform: translateX(-50%);
            width: fit-content;
            overflow: hidden;
        }

        .home .logo-short {
            display: none;
        }

        .home .logo-full {
            display: block;
        }

        /* INNER: короткий логотип (только буква) */
        .inner .logo-container {
            position: absolute;
            left: 2rem;
            top: 1.5rem;
            transform: none;
            width: fit-content;
            overflow: hidden;
        }

        .inner .logo-full {
            display: none;
        }

        .inner .logo-short {
            display: block;
            cursor: pointer;
        }

        .logo-container {
            transition: left 0.6s cubic-bezier(0.65, 0, 0.35, 1), 
                        top 0.6s cubic-bezier(0.65, 0, 0.35, 1), 
                        transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
            z-index: 10;
        }

        .logo-link {
            display: inline-block;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        .logo-svg-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
        }

        /* АНИМАЦИЯ: обрезаем широкий логотип справа */
        body.morphing.home .logo-container {
            animation: moveAndClip 0.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        /* обратная анимация: разворачиваем широкий логотип */
        body.morphing.inner .logo-container {
            animation: moveAndExpand 0.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes moveAndClip {
            0% {
                left: 50%;
                top: 15vh;
                transform: translateX(-50%);
                max-width: 100vw;
            }
            100% {
                left: 2rem;
                top: 1.5rem;
                transform: translateX(0);
                max-width: 44px;
            }
        }

        @keyframes moveAndExpand {
            0% {
                left: 2rem;
                top: 1.5rem;
                transform: translateX(0);
                max-width: 44px;
            }
            100% {
                left: 50%;
                top: 15vh;
                transform: translateX(-50%);
                max-width: 100vw;
            }
        }

        /* широкий логотип внутри контейнера с обрезкой */
        body.morphing.home .logo-full {
            display: block;
            transform-origin: left center;
            width: auto;
            max-width: none;
        }

        body.morphing.home .logo-short {
            display: none;
        }

        body.morphing.inner .logo-short {
            display: block;
            animation: fadeOutShort 0.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        body.morphing.inner .logo-full {
            display: block;
            transform-origin: left center;
            animation: fadeInFull 0.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes fadeOutShort {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                opacity: 0;
            }
        }

        @keyframes fadeInFull {
            0% {
                opacity: 0;
                clip-path: inset(0 70% 0 0);
            }
            50% {
                opacity: 0.5;
                clip-path: inset(0 35% 0 0);
            }
            100% {
                opacity: 1;
                clip-path: inset(0 0 0 0);
            }
        }

        .nav-links {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 35vh;
            z-index: 5;
        }

        .btn {
            background: #4d506b;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.2rem;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            box-shadow: 0 8px 0 #2a2c3b, 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            border: 2px solid #6a6e8c;
            touch-action: manipulation;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #2a2c3b, 0 5px 12px rgba(0,0,0,0.3);
        }

        .inner .nav-links {
            display: none;
        }

        .page-indicator {
            color: #b9bff2;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.2);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            align-self: center;
            margin-top: 2rem;
            backdrop-filter: blur(2px);
        }

        .inner .content-box {
            background: #3d405b;
            padding: 2rem;
            border-radius: 3rem;
            color: #eaeefc;
            width: 100%;
            max-width: 500px;
            align-self: center;
            margin-top: 12vh;
            border: 2px solid #5f6382;
            box-shadow: 0 15px 0 #2a2c3b;
        }

        .logo-short {
            content: url('svgs/logoshort.svg');
        }

        .logo-full {
            content: url('svgs/logofull.svg');
        }

        img {
            background: transparent;
            border: none;
            outline: none;
        }

        @media (orientation: landscape) {
            .home .logo-container {
                top: 8vh;
            }
            .inner .logo-container {
                left: 2rem;
                top: 1.5rem;
            }
            .nav-links {
                margin-top: 25vh;
            }
        }
    </style>
</head>
<body class="home" id="main-page">
    <div class="app">
        <div class="logo-container">
            <a href="#" class="logo-link" id="logoButton" onclick="return false;">
                <div class="logo-svg-wrapper">
                    <img class="logo-full" src="svgs/logofull.svg" alt="Full logo" draggable="false">
                    <img class="logo-short" src="svgs/logoshort.svg" alt="Short logo" draggable="false">
                </div>
            </a>
        </div>

        <div class="nav-links">
            <button class="btn" id="toInnerBtn">→ на внутреннюю</button>
        </div>

        <div class="page-indicator" id="pageLabel">главная · широкий логотип</div>

        <div id="innerPageContent" style="width: 100%; display: none; justify-content: center;">
            <div class="content-box">
                ✦ внутренняя страница ✦<br>
                теперь обратный переход тоже плавный<br>
                <span style="color: #b9adff;">текст наплывает справа</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const body = document.getElementById('main-page');
            const toInnerBtn = document.getElementById('toInnerBtn');
            const logoBtn = document.getElementById('logoButton');
            const pageLabel = document.getElementById('pageLabel');
            const innerContent = document.getElementById('innerPageContent');
            const logoContainer = document.querySelector('.logo-container');
            
            let isAnimating = false;

            function navigateTo(targetPage) {
                if (isAnimating) return;
                
                const currentIsHome = body.classList.contains('home');
                
                if ((targetPage === 'home' && currentIsHome) || (targetPage === 'inner' && !currentIsHome)) {
                    return;
                }

                isAnimating = true;
                body.classList.add('morphing');

                setTimeout(() => {
                    if (targetPage === 'inner') {
                        body.classList.remove('home');
                        body.classList.add('inner');
                        pageLabel.innerText = 'внутренняя · короткий логотип';
                        innerContent.style.display = 'flex';
                        logoContainer.style.maxWidth = '';
                    } else {
                        body.classList.remove('inner');
                        body.classList.add('home');
                        pageLabel.innerText = 'главная · широкий логотип';
                        innerContent.style.display = 'none';
                        logoContainer.style.maxWidth = '';
                    }
                    
                    body.classList.remove('morphing');
                    isAnimating = false;
                }, 600);
            }

            toInnerBtn.addEventListener('click', () => navigateTo('inner'));

            logoBtn.addEventListener('click', () => {
                if (body.classList.contains('inner')) {
                    navigateTo('home');
                }
            });

            document.querySelectorAll('.logo-full, .logo-short').forEach(img => {
                img.onerror = function() {
                    if (this.classList.contains('logo-short')) {
                        this.style.backgroundColor = '#8a6de9';
                        this.style.width = '44px';
                        this.style.height = '44px';
                        this.style.borderRadius = '8px';
                    } else {
                        this.style.backgroundColor = '#8a6de9';
                        this.style.width = '120px';
                        this.style.height = '44px';
                        this.style.borderRadius = '8px';
                    }
                };
            });

            const style = document.createElement('style');
            style.textContent = `
                .inner .logo-link {
                    cursor: pointer;
                }
                .home .logo-link {
                    cursor: default;
                }
                img {
                    border: none !important;
                    outline: none !important;
                    box-shadow: none !important;
                }
            `;
            document.head.appendChild(style);
        })();
    </script>
</body>
</html>
