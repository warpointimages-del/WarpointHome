<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WARPOINT · Станколит</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home" id="main-page">
    <div class="app">
        <div class="logo-container">
            <div class="logo-svg-wrapper">
                <img class="logo-full" src="svgs/logofull.svg" alt="Full logo" draggable="false">
                <img class="logo-short" src="svgs/logoshort.svg" alt="Short logo" draggable="false">
            </div>
        </div>

        <div class="page-wrapper" id="pageWrapper">
            <div class="home-content" id="homeContent">
                <a href="#" class="nav-card" data-url="combo.html">Комбо</a>
                <a href="#" class="nav-card" data-url="birthdays.html">Дни рождения</a>
                <a href="#" class="nav-card" data-url="corporate.html">Корпоративы</a>
                <a href="#" class="nav-card" data-url="registration.html">Регистрация</a>
            </div>
        </div>
    </div>
    
    <div class="page-indicator" id="pageIndicator">Станколит</div>

    <script>
        (function() {
            const body = document.getElementById('main-page');
            const pageWrapper = document.getElementById('pageWrapper');
            const pageIndicator = document.getElementById('pageIndicator');
            let isTransitioning = false;

            // Анимация появления элементов
            function animateEntrance() {
                const cards = document.querySelectorAll('.nav-card');
                const indicator = document.getElementById('pageIndicator');
                
                // Сбрасываем классы
                cards.forEach(card => {
                    card.classList.remove('animate-item');
                });
                if (indicator) indicator.classList.remove('visible');
                
                // Форсируем reflow
                void document.body.offsetHeight;
                
                // Анимируем карточки с задержкой
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.add('animate-item');
                    }, index * 80);
                });
                
                // Анимируем индикатор
                setTimeout(() => {
                    if (indicator) indicator.classList.add('visible');
                }, cards.length * 80 + 50);
            }

            function navigateToInner(url) {
                if (isTransitioning) return;
                isTransitioning = true;
                
                body.classList.add('morphing');
                pageWrapper.classList.add('slide-out-left');
                
                setTimeout(() => {
                    window.location.href = url;
                }, 400);
            }

            document.querySelectorAll('.nav-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    e.preventDefault();
                    const url = card.getAttribute('data-url');
                    navigateToInner(url);
                });
            });
            
            // Запускаем анимацию при загрузке
            animateEntrance();
        })();
    </script>
</body>
</html>
