<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WARPOINT · Комбо</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="inner" id="main-page">
    <div class="app">
        <div class="logo-container">
            <div class="logo-svg-wrapper">
                <img class="logo-full" src="svgs/logofull.svg" alt="Full logo" draggable="false">
                <img class="logo-short" src="svgs/logoshort.svg" alt="Short logo" draggable="false">
            </div>
        </div>

        <div class="page-wrapper" id="pageWrapper">
            <div class="inner-content" id="innerContent">
                <h2>Комбо</h2>
            </div>
        </div>
    </div>
    
    <div class="page-indicator" id="pageIndicator">Станколит</div>

    <script>
        (function() {
            const body = document.getElementById('main-page');
            const pageWrapper = document.getElementById('pageWrapper');
            const pageIndicator = document.getElementById('pageIndicator');
            let isTransitioning = false;

            // Анимация появления элементов
            function animateEntrance() {
                const title = document.querySelector('.inner-content h2');
                const indicator = document.getElementById('pageIndicator');
                
                // Сбрасываем классы
                if (title) title.classList.remove('animate-item');
                if (indicator) indicator.classList.remove('visible');
                
                // Форсируем reflow
                void document.body.offsetHeight;
                
                // Анимируем заголовок
                setTimeout(() => {
                    if (title) title.classList.add('animate-item');
                }, 100);
                
                // Анимируем индикатор
                setTimeout(() => {
                    if (indicator) indicator.classList.add('visible');
                }, 300);
            }

            function navigateToHome() {
                if (isTransitioning) return;
                isTransitioning = true;
                
                body.classList.add('morphing');
                pageWrapper.style.transform = 'translateX(100%)';
                pageWrapper.style.transition = 'transform 0.4s cubic-bezier(0.65, 0, 0.35, 1)';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 400);
            }

            document.querySelector('.logo-container').addEventListener('click', (e) => {
                e.preventDefault();
                navigateToHome();
            });
            
            setTimeout(() => {
                pageWrapper.style.transform = 'translateX(0)';
                pageWrapper.style.transition = 'transform 0.4s cubic-bezier(0.65, 0, 0.35, 1)';
            }, 50);
            
            // Запускаем анимацию появления
            animateEntrance();
        })();
    </script>
</body>
</html>
